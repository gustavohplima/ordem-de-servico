events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Otimização de performance
    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  65;
    server_tokens   off;
    client_max_body_size 50m;

    # Compactação Gzip para assets
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;
    gzip_disable "MSIE [1-6]\.";

    # Upstream Node server (Angular Universal)
    upstream node_app {
        server 127.0.0.1:4000;
    }

    server {
        listen       80;
        server_name  localhost;
        root   /usr/share/nginx/html;
        index  index.html;

        # Segurança básica
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # Healthcheck simples
        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 'OK';
        }

        # Serve arquivos estáticos (assets, js, css, fontes, imagens)
        location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|svg|svgz|woff2?|woff|ttf|eot|otf|map|json)$ {
            try_files $uri =404;
            access_log off;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Arquivos estáticos menos cacheáveis (index, service worker, manifest)
        location ~* \.(?:html|json)$ {
            try_files $uri =404;
            access_log off;
            expires 1m;
            add_header Cache-Control "public, max-age=60";
        }

        # Deep links e SSR: se o arquivo existe, serve; senão, encaminha para Node (SSR)
        location / {
            try_files $uri $uri/ @node_app;
        }

        location @node_app {
            proxy_pass http://node_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache_bypass $http_upgrade;
        }

        error_page  500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}
