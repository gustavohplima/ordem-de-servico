server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;
    client_max_body_size 50M;

    # Segurança básica
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Compressão para assets
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json image/svg+xml;

    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    # PROXY PARA BACKEND (Spring Boot)
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    location /api/ {
        proxy_pass http://spring-backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_redirect off;
    }

    # Healthcheck simples
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'OK';
    }

    # Cache forte para arquivos versionados
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|svg|svgz|woff2?|woff|ttf|eot|otf|map)$ {
        try_files $uri $uri/ /index.html; 
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # index.html nunca deve ser cacheado para evitar referência a chunks antigos
    location = /index.html {
        try_files $uri =404;
        access_log off;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
    }

    # JSON com cache curto
    location ~* \.json$ {
        try_files $uri =404;
        access_log off;
        expires 1m;
        add_header Cache-Control "public, max-age=60";
    }

    # Deep link SPA (Angular Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
