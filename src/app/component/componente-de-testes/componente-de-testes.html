<form [formGroup]="formulario" (ngSubmit)="aoSubmeter()">
  <div>
    <label for="nome">Nome:</label>
    <input id="nome" type="text" formControlName="nome" />
    
    @if (formulario.get('nome')?.touched && formulario.get('nome')?.invalid) {
      <p style="color: red;">O nome é obrigatório.</p>
    }
  </div>

  <div>
    <label for="email">E-mail:</label>
    <input id="email" type="email" formControlName="email" />

    @if (formulario.get('email')?.touched && formulario.get('email')?.invalid) {
      <p style="color: red;">Insira um e-mail válido.</p>
    }
  </div>

  <button type="submit" [disabled]="formulario.invalid">
    {{ labelBotao() }}
  </button>
</form>
