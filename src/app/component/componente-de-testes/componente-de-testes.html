<div class="mx-auto my-5 flex max-w-125 flex-col gap-4">
  
  @for (produto of produtos(); track produto.id) {
    <button 
      class="group rounded-lg border border-gray-200 bg-white p-4 text-left transition-all duration-200 cursor-pointer hover:shadow-lg"
      [class.!border-blue-500]="itemExpandidoId() === produto.id"
      [class.shadow-[0_4px_12px_rgba(59,130,246,0.15)]]="itemExpandidoId() === produto.id"
      (click)="alternarExpansao(produto.id)">
      
      <div class="flex items-center justify-between">
        <h3 class="m-0 text-lg font-bold text-gray-900">{{ produto.nome }}</h3>
        <span class="text-gray-600 font-medium">{{ produto.preco }}</span>
      </div>

      <!-- Container da Expansão usando utilitários de Grid e variantes dinâmicas do v4 -->
      <div 
        class="grid grid-rows-[0fr] transition-[grid-template-rows] duration-250 ease-out"
        [class.grid-rows-[1fr]]="itemExpandidoId() === produto.id">
        
        <div class="overflow-hidden">
          <p class="mt-3 border-t border-gray-100 pt-3 text-gray-600">
            {{ produto.descricao }}
          </p>
        </div>
      </div>

    </button>
  }

</div>
