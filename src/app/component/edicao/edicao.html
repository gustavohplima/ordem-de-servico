@if (copiaOrdem) {
  <div class="space-y-3">
    <div class="flex justify-between items-start mb-3">
      <div class="flex flex-col gap-2 flex-1 min-w-0">
        <input
          [(ngModel)]="copiaOrdem.nome"
          name="nome"
          class="w-full px-4 py-2 rounded-xl bg-[#08100d] border border-[#1a2f26] text-white placeholder-[#3f5c51] focus:ring-1 focus:ring-[#1fd68b] focus:border-[#1fd68b] outline-none transition-all font-bold text-lg"
          placeholder="Nome"
        >
        <div class="grid grid-cols-2 gap-2">
          <select
            [(ngModel)]="copiaOrdem.marca"
            name="marca"
            class="w-full px-3 py-2 rounded-xl bg-[#08100d] border border-[#1a2f26] text-white focus:ring-1 focus:ring-[#1fd68b] focus:border-[#1fd68b] outline-none transition-all"
          >
            <option value="" disabled hidden>Marca</option>
            <option value="Motorola">Motorola</option>
            <option value="Apple">Apple</option>
            <option value="Samsung">Samsung</option>
            <option value="Xiaomi">Xiaomi</option>
            <option value="Realme">Realme</option>
            <option value="Infinix">Infinix</option>
            <option value="Outro">Outro</option>
          </select>
          <input
            [(ngModel)]="copiaOrdem.modelo"
            (ngModelChange)="copiaOrdem.modelo = $event.toUpperCase()"
            name="modelo"
            class="w-full px-3 py-2 rounded-xl bg-[#08100d] border border-[#1a2f26] text-white placeholder-[#3f5c51] focus:ring-1 focus:ring-[#1fd68b] focus:border-[#1fd68b] outline-none transition-all"
            placeholder="Modelo"
            style="text-transform: uppercase;"
          >
        </div>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-4">
      <div class="text-[#1fd68b] font-bold text-lg">
        <input
          type="number"
          [(ngModel)]="copiaOrdem.valor"
          name="valor"
          class="w-full px-4 py-2 rounded-xl bg-[#08100d] border border-[#1a2f26] text-white placeholder-[#3f5c51] focus:ring-1 focus:ring-[#1fd68b] focus:border-[#1fd68b] outline-none transition-all"
          placeholder="Valor"
        >
      </div>
      <div class="flex items-center gap-2">
        <mat-icon class="text-[16px] w-4 h-4 text-[#7aa899]">tag</mat-icon>
        <span class="text-xs uppercase text-[#5f8a7c]">ID {{ copiaOrdem.id }}</span>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-y-3 gap-x-2 text-sm text-[#7aa899] mb-4">
      <div class="flex items-center gap-2">
        <mat-icon class="text-[16px] w-4 h-4">call</mat-icon>
        <input [(ngModel)]="copiaOrdem.contato" name="contato" class="w-full px-3 py-2 rounded-xl bg-[#08100d] border border-[#1a2f26] text-white placeholder-[#3f5c51] focus:ring-1 focus:ring-[#1fd68b] focus:border-[#1fd68b] outline-none transition-all" placeholder="Telefone">
      </div>
      <div class="flex items-center gap-2">
        <mat-icon class="text-[16px] w-4 h-4">sell</mat-icon>
        <input [(ngModel)]="copiaOrdem.defeito" name="defeito" class="w-full px-3 py-2 rounded-xl bg-[#08100d] border border-[#1a2f26] text-white placeholder-[#3f5c51] focus:ring-1 focus:ring-[#1fd68b] focus:border-[#1fd68b] outline-none transition-all" placeholder="Defeito">
      </div>
      <div class="flex items-center gap-2">
        <mat-icon class="text-[16px] w-4 h-4">description</mat-icon>
        <input [(ngModel)]="copiaOrdem.cpf" name="cpf" class="w-full px-3 py-2 rounded-xl bg-[#08100d] border border-[#1a2f26] text-white placeholder-[#3f5c51] focus:ring-1 focus:ring-[#1fd68b] focus:border-[#1fd68b] outline-none transition-all" placeholder="CPF">
      </div>
      <div class="flex items-center gap-2">
        <mat-icon class="text-[16px] w-4 h-4">palette</mat-icon>
        <input [(ngModel)]="copiaOrdem.cor" name="cor" class="w-full px-3 py-2 rounded-xl bg-[#08100d] border border-[#1a2f26] text-white placeholder-[#3f5c51] focus:ring-1 focus:ring-[#1fd68b] focus:border-[#1fd68b] outline-none transition-all" placeholder="Cor">
      </div>
      <div class="flex items-center gap-2">
        <mat-icon class="text-[16px] w-4 h-4">event</mat-icon>
        <span class="text-xs text-[#5f8a7c]">{{ copiaOrdem.dataHora | date:'dd/MM/yyyy HH:mm' }}</span>
      </div>
      <div class="flex items-center gap-2">
        <mat-icon class="text-[16px] w-4 h-4">credit_card</mat-icon>
        <select [(ngModel)]="copiaOrdem.forma_pagamento" name="forma_pagamento" class="w-full px-3 py-2 rounded-xl bg-[#08100d] border border-[#1a2f26] text-white focus:ring-1 focus:ring-[#1fd68b] focus:border-[#1fd68b] outline-none transition-all">
          <option value="" disabled hidden>Pagamento</option>
          <option value="Não informado">Não informado</option>
          <option value="Dinheiro">Dinheiro</option>
          <option value="Pix">Pix</option>
          <option value="Crédito">Crédito</option>
          <option value="Débito">Débito</option>
        </select>
      </div>
      <div class="flex items-center gap-2 col-span-2">
        <mat-icon class="text-[16px] w-4 h-4">qr_code_2</mat-icon>
        <input [(ngModel)]="copiaOrdem.imei_nserie" name="imei_nserie" class="w-full px-3 py-2 rounded-xl bg-[#08100d] border border-[#1a2f26] text-white placeholder-[#3f5c51] focus:ring-1 focus:ring-[#1fd68b] focus:border-[#1fd68b] outline-none transition-all" placeholder="IMEI/Série">
      </div>
    </div>

    <div class="bg-[#0d1713] border border-[#1a2f26] rounded-xl p-3 text-sm">
      <textarea
        [(ngModel)]="copiaOrdem.observacao"
        name="observacao"
        class="bg-transparent text-[#7aa899] border-none outline-none resize-none w-full placeholder-[#3f5c51]"
        rows="1"
        placeholder="Observação"
      ></textarea>
    </div>

    <div class="flex gap-3 pt-1">
      <button
        type="button"
        (click)="salvarAlteracoes()"
        class="flex-1 bg-[#132b21] hover:bg-[#1a382b] text-white font-bold py-2.5 px-4 rounded-xl transition-colors flex items-center justify-center gap-2 text-sm border border-[#1a2f26]"
      >
        <mat-icon class="text-[18px] w-4.5 h-4.5">check</mat-icon>
        Salvar
      </button>
      <button
        type="button"
        (click)="cancelarEdicao()"
        class="w-11 h-11 flex items-center justify-center bg-[#132b21] hover:bg-red-900/30 text-[#7aa899] hover:text-red-400 rounded-xl transition-colors border border-[#1a2f26]"
      >
        <mat-icon class="text-[18px] w-4.5 h-4.5">close</mat-icon>
      </button>
    </div>
  </div>
}
