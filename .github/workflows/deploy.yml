name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Testar se o segredo existe
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then echo "USUARIO VAZIO"; else echo "USUARIO OK"; fi
          if [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then echo "SENHA VAZIA"; else echo "SENHA OK"; fi


      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/jdfcell:latest
